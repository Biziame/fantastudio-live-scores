name: Fetch Serie A Live Scores

on:
  workflow_dispatch:
    inputs:
      gameweek:
        description: 'Giornata da scaricare (es. 33), lascia vuoto per usare la più recente'
        required: false
        default: ''
      skip_time_check:
        description: 'Salta il controllo finestra orario? (true/false)'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GAMEWEEK: ${{ github.event.inputs.gameweek }}
          SKIP_TIME_CHECK: ${{ github.event.inputs.skip_time_check }}
        run: python fetch_scores.py

      - name: Run fetch_lineups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GAMEWEEK: ${{ github.event.inputs.gameweek }}
          SKIP_TIME_CHECK: ${{ github.event.inputs.skip_time_check }}
        run: python fetch_lineups.py
