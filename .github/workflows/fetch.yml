name: Fetch Serie A Live Scores

on:
  schedule:
    # Ogni 5 minuti dalle 12:00 alle 23:00 UTC (14:00-01:00 ora italiana)
    - cron: '*/5 12-23 * * *'
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Data da testare (YYYY-MM-DD), lascia vuoto per oggi'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: python fetch_scores.py

      - name: Run fetch_lineups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: python fetch_lineups.py
